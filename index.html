
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
#wrap{position:relative;width:100%;height:680px;overflow:hidden;background:#06060d;font-family:Georgia,serif;-webkit-font-smoothing:antialiased}
#stars-c{position:absolute;inset:0;z-index:0;pointer-events:none}
.vig{position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 20%,rgba(0,0,0,0.72) 100%)}
.grain{position:absolute;inset:-50%;width:200%;height:200%;z-index:100;pointer-events:none;opacity:0.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:gr .5s steps(2) infinite}
@keyframes gr{0%{transform:translate(0,0)}50%{transform:translate(3%,2%)}}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;opacity:0;pointer-events:none;transition:opacity 1.5s ease}
.scene.active{opacity:1;pointer-events:all}
.sc-name{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-style:italic;font-size:clamp(2rem,5vw,3.2rem);color:rgba(232,196,112,0.8);letter-spacing:0.03em;text-shadow:0 0 30px rgba(201,160,82,0.3);animation:rise 1.6s ease both}
.q-text{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-style:italic;font-size:clamp(1.15rem,2.8vw,1.9rem);color:rgba(255,255,255,0.62);text-align:center;line-height:1.65;max-width:480px;padding:0 2rem;animation:rise 2s ease 0.3s both}
.tw-text{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-style:italic;font-size:clamp(0.88rem,1.9vw,1.3rem);text-align:center;line-height:2.1;white-space:pre-line;max-width:520px;padding:0 2rem;opacity:0}
.cur{display:inline-block;width:1.5px;height:0.85em;background:currentColor;margin-left:2px;vertical-align:middle;animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fl{width:1px;height:46px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.15),transparent);margin:0 auto}
.istack{display:flex;flex-direction:column;align-items:center;gap:2.5rem;animation:rise 2.3s ease 0.5s both}
.el-in{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.9);font-family:'Palatino Linotype',Palatino,Georgia,serif;font-style:italic;font-size:clamp(2.5rem,7vw,4.5rem);text-align:center;width:200px;outline:none;padding-bottom:4px;transition:border-color 0.4s;-moz-appearance:textfield;appearance:textfield}
.el-in::-webkit-inner-spin-button,.el-in::-webkit-outer-spin-button{-webkit-appearance:none}
.el-in:focus{border-bottom-color:rgba(255,255,255,0.6)}
.el-in::placeholder{color:rgba(255,255,255,0.1)}
.el-in.warm{color:rgba(255,210,120,0.9);border-bottom-color:rgba(201,160,82,0.25)}
.el-in.warm:focus{border-bottom-color:rgba(201,160,82,0.7)}
.gb{background:transparent;border:1px solid rgba(255,255,255,0.16);color:rgba(255,255,255,0.38);font-family:Helvetica,Arial,sans-serif;font-size:0.58rem;font-weight:500;letter-spacing:0.35em;text-transform:uppercase;padding:0.8rem 2.6rem;cursor:pointer;transition:all 0.4s}
.gb:hover{border-color:rgba(255,255,255,0.6);color:rgba(255,255,255,0.88)}
.gb.w{border-color:rgba(201,160,82,0.22);color:rgba(201,160,82,0.45)}
.gb.w:hover{border-color:rgba(201,160,82,0.75);color:rgba(255,210,120,0.9)}
.db{background:transparent;border:1px solid rgba(255,255,255,0.16);color:rgba(255,255,255,0.38);font-family:Helvetica,Arial,sans-serif;font-size:0.62rem;font-weight:500;letter-spacing:0.38em;text-transform:uppercase;padding:1rem 3.5rem;cursor:pointer;transition:all 0.5s}
.db:hover{transform:scale(1.05) translateY(-2px);color:rgba(255,255,255,0.9)}
.db.y:hover{border-color:rgba(201,160,82,0.7);box-shadow:0 0 40px rgba(201,160,82,0.12);color:rgba(255,225,140,0.95)}
.db.nn:hover{border-color:rgba(140,160,195,0.7);color:rgba(185,205,235,0.95)}
.drow{display:flex;gap:2.8rem;align-items:center}
.dq{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-style:italic;font-size:clamp(1.1rem,2.6vw,1.85rem);color:rgba(255,255,255,0.62);text-align:center;line-height:1.6;max-width:460px;padding:0 2rem}
.rb{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);background:transparent;border:1px solid rgba(201,160,82,0.32);color:rgba(201,160,82,0.65);font-family:Helvetica,Arial,sans-serif;font-size:0.58rem;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;padding:0.85rem 2.8rem;cursor:pointer;transition:all 0.5s;opacity:0;z-index:10;white-space:nowrap}
.rb:hover{border-color:rgba(201,160,82,0.9);color:rgba(255,218,120,1);box-shadow:0 0 30px rgba(201,160,82,0.18);transform:translateX(-50%) translateY(-2px)}
#ov{position:absolute;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,13,0);opacity:0;pointer-events:none;transition:opacity 1.2s ease}
#ov.show{opacity:1;pointer-events:all;background:rgba(6,6,13,0.97)}
#ov-c{position:absolute;inset:0;z-index:0}
.oc{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:2rem;max-width:520px;padding:0 2rem;text-align:center}
.os{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-style:italic;font-size:clamp(2.2rem,6vw,3.8rem);color:rgba(232,196,112,0.85);opacity:0;text-shadow:0 0 50px rgba(201,160,82,0.35);transition:opacity 1.2s ease 0.3s}
.ob{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-style:italic;font-size:clamp(0.9rem,1.8vw,1.28rem);color:rgba(255,255,255,0.7);line-height:2;opacity:0;transition:opacity 1.4s ease 1.1s;white-space:pre-line}
.ol{width:50px;height:1px;background:linear-gradient(to right,transparent,rgba(201,160,82,0.5),transparent);opacity:0;transition:opacity 1s ease 2.1s}
.octa{background:transparent;border:1px solid rgba(201,160,82,0.42);color:rgba(201,160,82,0.75);font-family:Helvetica,Arial,sans-serif;font-size:0.58rem;font-weight:500;letter-spacing:0.35em;text-transform:uppercase;padding:0.95rem 3rem;cursor:pointer;transition:border-color 0.4s,color 0.4s,box-shadow 0.4s;opacity:0}
.octa:hover{border-color:rgba(201,160,82,0.9);color:rgba(255,218,120,1);box-shadow:0 0 35px rgba(201,160,82,0.18)}
#ov.show .os,#ov.show .ob,#ov.show .ol{opacity:1}
</style>

<div id="wrap">
  <canvas id="stars-c"></canvas>
  <div class="vig"></div>
  <div class="grain"></div>

  <div id="s1" class="scene active">
    <p class="sc-name">Shravani</p>
    <p class="q-text">How many times did I make you cry?</p>
    <div class="istack">
      <div class="fl"></div>
      <input class="el-in" id="t-in" type="number" min="0" max="999" placeholder="0">
      <button class="gb" id="t-sub">I remember</button>
    </div>
  </div>

  <div id="s2" class="scene">
    <canvas id="f-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
    <p class="tw-text" id="f-msg" style="position:absolute;bottom:9%;left:50%;transform:translateX(-50%);color:rgba(190,230,175,0.9);z-index:5;text-shadow:0 0 30px rgba(100,200,80,0.12)"></p>
  </div>

  <div id="s3" class="scene">
    <canvas id="m-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
    <div id="m-ui" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2.4rem;z-index:5;transition:opacity 1.1s ease">
      <p class="q-text" style="color:rgba(255,200,95,0.65);animation:none">How many days did you enjoy with me?</p>
      <div class="fl" style="background:linear-gradient(to bottom,transparent,rgba(201,160,82,0.2),transparent)"></div>
      <input class="el-in warm" id="d-in" type="number" min="0" max="9999" placeholder="0">
      <button class="gb w" id="d-sub">I cherish them</button>
    </div>
    <p class="tw-text" id="m-msg" style="position:absolute;bottom:9%;left:50%;transform:translateX(-50%);color:rgba(255,205,115,0.9);z-index:5;white-space:nowrap"></p>
  </div>

  <div id="s4" class="scene" style="gap:4rem">
    <p class="dq">Do you really think those days matter now?</p>
    <div class="drow">
      <button class="db y" id="b-yes">Yes</button>
      <button class="db nn" id="b-no">No</button>
    </div>
  </div>

  <div id="s5" class="scene">
    <canvas id="y-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
    <p class="tw-text" id="y-msg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,222,138,0.95);text-shadow:0 0 60px rgba(201,160,82,0.28);z-index:5"></p>
    <button class="rb" id="r-btn">Can we start again?</button>
  </div>

  <div id="s6" class="scene">
    <p class="tw-text" id="no-msg" style="color:rgba(168,182,210,0.82)"></p>
  </div>

  <div id="ov">
    <canvas id="ov-c"></canvas>
    <div class="oc">
      <div class="os">Shravani…</div>
      <div class="ol"></div>
      <div class="ob" id="ov-b"></div>
      <button class="octa" id="ov-go">Begin again</button>
    </div>
  </div>
</div>

<script>
var tearN=1,dayN=10,rIds={},mParts=[],ovRaf=null;
var eIQ=function(t){return t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2};
var eOE=function(t){return t===1?1:1-Math.pow(2,-10*t)};
var eOC=function(t){return 1-Math.pow(1-t,3)};
var lerp=function(a,b,t){return a+(b-a)*t};

// Stars
(function(){
  var c=document.getElementById('stars-c'),ctx=c.getContext('2d'),s=[];
  function sz(){c.width=document.getElementById('wrap').offsetWidth;c.height=document.getElementById('wrap').offsetHeight}
  sz();
  for(var i=0;i<200;i++)s.push({x:Math.random(),y:Math.random(),r:Math.random()*.8+.1,base:Math.random()*.28+.04,sp:Math.random()*.005+.001,ph:Math.random()*Math.PI*2});
  var t=0;
  (function draw(){t+=.012;ctx.clearRect(0,0,c.width,c.height);
    s.forEach(function(st){var a=(Math.sin(t*st.sp*80+st.ph)*.25+.75)*st.base;ctx.beginPath();ctx.arc(st.x*c.width,st.y*c.height,st.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill()});
    requestAnimationFrame(draw)})()
})();

function goTo(id,d){
  return new Promise(function(res){
    setTimeout(function(){
      document.querySelectorAll('.scene').forEach(function(s){s.classList.remove('active')});
      setTimeout(function(){document.getElementById(id).classList.add('active');setTimeout(res,1600)},100)
    },d||0)
  })
}

function typeW(el,txt,opts){
  var delay=opts&&opts.delay||0,spd=opts&&opts.speed||46;
  return new Promise(function(res){
    setTimeout(function(){
      el.style.opacity='1';var i=0,chars=[...txt];el.textContent='';
      var cur=document.createElement('span');cur.className='cur';el.appendChild(cur);
      function tick(){
        if(i>=chars.length){setTimeout(function(){cur.remove();res()},600);return}
        cur.insertAdjacentText('beforebegin',chars[i]);i++;
        var s=chars[i-1]==='\n'?spd*8:'.…,!?'.includes(chars[i-1])?spd*5:spd;
        setTimeout(tick,s)}
      tick()},delay)})
}

/* ── Forest ── */
function runForest(){
  var canvas=document.getElementById('f-c'),ctx=canvas.getContext('2d');
  canvas.width=document.getElementById('wrap').offsetWidth;
  canvas.height=document.getElementById('wrap').offsetHeight;
  var W=canvas.width,H=canvas.height,HOR=H*.63;
  var n=Math.min(Math.max(tearN,1),20);

  function buildBranch(x,y,ang,len,dep,hue){
    if(dep<=0||len<1.5)return null;
    var ex=x+Math.cos(ang)*len,ey=y+Math.sin(ang)*len;
    return{x:x,y:y,ex:ex,ey:ey,len:len,dep:dep,ang:ang,hue:hue,
      L:buildBranch(ex,ey,ang-0.36-Math.random()*.16,len*.68,dep-1,hue),
      R:buildBranch(ex,ey,ang+0.36+Math.random()*.16,len*.68,dep-1,hue)}}

  var trees=[];
  var sp=W/(n+1);
  for(var i=0;i<n;i++){
    var tx=sp*(i+1)+(Math.random()-.5)*sp*.38;
    var hue=105+Math.random()*45;
    var layer=i%3;
    trees.push({x:tx,baseY:HOR,hue:hue,trunkH:70+Math.random()*100,
      sway:.15+Math.random()*.15,swayPh:Math.random()*Math.PI*2,
      dep:6+Math.floor(Math.random()*2),layer:layer,br:null,
      scale:.6+layer*.22});
  }
  trees.sort(function(a,b){return a.layer-b.layer});

  var ff=Array.from({length:Math.min(n*3,35)},function(){return{
    x:W*.15+Math.random()*W*.7,y:HOR*.25+Math.random()*HOR*.5,
    vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.3,
    ph:Math.random()*Math.PI*2,fr:.8+Math.random()*1.5}});

  var leaves=Array.from({length:n*8},function(){return{
    x:Math.random()*W,y:-20-Math.random()*150,
    vx:(Math.random()-.5)*1.1,vy:1.4+Math.random()*1.8,
    r:1.4+Math.random()*2.2,alpha:.35+Math.random()*.4,
    rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.04,
    hue:90+Math.random()*55,done:false,delay:Math.random()*2800}});

  function drawBr(node,prog,t,sph){
    if(!node||prog<=0)return;
    var wb=Math.sin(t*.9+sph)*.04*(node.dep/9);
    var dx=node.ex-node.x,dy=node.ey-node.y;
    var ex2=node.x+dx*Math.cos(wb)-dy*Math.sin(wb);
    var ey2=node.y+dx*Math.sin(wb)+dy*Math.cos(wb);
    var a=Math.min(.9,prog*2.2);var L=18+node.dep*8;
    ctx.beginPath();ctx.moveTo(node.x,node.y);ctx.lineTo(ex2,ey2);
    ctx.strokeStyle='hsla('+(node.hue+node.dep*5)+','+(28+node.dep*5)+'%,'+L+'%,'+a+')';
    ctx.lineWidth=Math.max(.4,node.dep*.65);ctx.lineCap='round';ctx.stroke();
    if(node.dep<=2&&prog>.65){
      var lp=eOC((prog-.65)/.35)*Math.min(1,prog*1.4);
      var ls=(2.5+Math.random()*2.5)*lp;
      ctx.beginPath();ctx.arc(ex2,ey2,ls*2.8,0,Math.PI*2);
      ctx.fillStyle='hsla('+(node.hue+15)+',52%,28%,'+(lp*.5)+')';ctx.fill();
      ctx.beginPath();ctx.arc(ex2,ey2,ls,0,Math.PI*2);
      ctx.fillStyle='hsla('+(node.hue+15)+',52%,32%,'+(lp*.8)+')';ctx.fill();
    }
    if(node.dep>1){var cp=Math.max(0,(prog-.1)/.9);drawBr(node.L,cp,t,sph);drawBr(node.R,cp,t,sph)}
  }

  var st=null,DUR=6500;
  function frame(ts){
    if(!st)st=ts;var el=ts-st,raw=Math.min(el/DUR,1),prog=eIQ(raw),t=el/1000;
    ctx.clearRect(0,0,W,H);
    // Sky
    var sky=ctx.createLinearGradient(0,0,0,HOR);
    sky.addColorStop(0,'rgb('+(lerp(6,8,prog)|0)+','+(lerp(6,10,prog)|0)+','+(lerp(12,17,prog)|0)+')');
    sky.addColorStop(1,'rgb('+(lerp(9,14,prog)|0)+','+(lerp(14,20,prog)|0)+','+(lerp(11,14,prog)|0)+')');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,HOR);
    // Moon
    if(prog>.3){var mp=eOC((prog-.3)/.7),mx=W*.8,my=H*.1;
      var mg=ctx.createRadialGradient(mx,my,0,mx,my,100);
      mg.addColorStop(0,'rgba(255,245,220,'+(mp*.1)+')');mg.addColorStop(1,'rgba(255,220,160,0)');
      ctx.fillStyle=mg;ctx.fillRect(0,0,W,HOR);
      ctx.beginPath();ctx.arc(mx,my,14,0,Math.PI*2);ctx.fillStyle='rgba(255,248,228,'+(mp*.82)+')';ctx.fill()}
    // Ground
    var gnd=ctx.createLinearGradient(0,HOR,0,H);
    gnd.addColorStop(0,'rgb('+(lerp(16,28,prog)|0)+','+(lerp(20,36,prog)|0)+','+(lerp(10,18,prog)|0)+')');
    gnd.addColorStop(1,'rgb('+(lerp(7,14,prog)|0)+','+(lerp(9,17,prog)|0)+','+(lerp(4,9,prog)|0)+')');
    ctx.fillStyle=gnd;ctx.fillRect(0,HOR,W,H-HOR);
    // Mist
    if(prog>.45){var mp2=(prog-.45)/.55;var mist=ctx.createLinearGradient(0,HOR-25,0,HOR+35);
      mist.addColorStop(0,'rgba(150,200,160,0)');mist.addColorStop(.5,'rgba(130,180,145,'+(mp2*.07)+')');mist.addColorStop(1,'rgba(80,120,90,0)');
      ctx.fillStyle=mist;ctx.fillRect(0,HOR-25,W,60)}
    // Leaves
    leaves.forEach(function(lf){
      if(lf.done||el<lf.delay)return;
      lf.x+=lf.vx+Math.sin(t*.7+(lf.ph||0))*.5;lf.y+=lf.vy;lf.rot+=lf.rv;
      if(lf.y>HOR+8){lf.done=true;return}
      ctx.save();ctx.translate(lf.x,lf.y);ctx.rotate(lf.rot);
      ctx.beginPath();ctx.ellipse(0,0,lf.r*1.3,lf.r*.55,0,0,Math.PI*2);
      ctx.fillStyle='hsla('+lf.hue+',48%,28%,'+lf.alpha+')';ctx.fill();ctx.restore()});
    // Trees
    trees.forEach(function(td){
      var tp=Math.min(prog,1);if(!td.br&&tp>.04)
        td.br=buildBranch(td.x,td.baseY,-Math.PI/2,td.trunkH*.52*td.scale,td.dep,td.hue);
      var sw=Math.sin(t*.9+td.swayPh)*td.sway,ta=Math.min(.92,tp*1.8);
      var tkH=td.trunkH*tp*td.scale;
      ctx.beginPath();ctx.moveTo(td.x,td.baseY);
      ctx.bezierCurveTo(td.x+sw*4,td.baseY-tkH*.3,td.x+sw*12,td.baseY-tkH*.6,td.x+sw*16,td.baseY-tkH);
      ctx.strokeStyle='rgba('+(32+td.layer*8)+','+(22+td.layer*7)+','+(10+td.layer*5)+','+ta+')';
      ctx.lineWidth=3+td.layer*2;ctx.lineCap='round';ctx.stroke();
      if(td.br)drawBr(td.br,tp,t,td.swayPh)});
    // Fireflies
    if(prog>.5){var fpp=(prog-.5)/.5;
      ff.forEach(function(f){
        f.x+=f.vx+Math.sin(t*f.fr+f.ph)*.4;f.y+=f.vy+Math.cos(t*f.fr*.7+f.ph)*.25;
        if(f.x<0)f.x=W;if(f.x>W)f.x=0;if(f.y<HOR*.1)f.y=HOR*.6;if(f.y>HOR)f.y=HOR*.15;
        var pulse=(Math.sin(t*f.fr*3+f.ph)*.5+.5)*fpp;
        var fg=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,7);
        fg.addColorStop(0,'rgba(190,255,140,'+(pulse*.9)+')');fg.addColorStop(1,'rgba(170,255,120,0)');
        ctx.beginPath();ctx.arc(f.x,f.y,7,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
        ctx.beginPath();ctx.arc(f.x,f.y,1.4,0,Math.PI*2);ctx.fillStyle='rgba(210,255,170,'+pulse+')';ctx.fill()})}
    if(raw<1){rIds.forest=requestAnimationFrame(frame)}
    else{var msg=document.getElementById('f-msg');
      typeW(msg,'I know I hurt you, Shravani…\nMore times than I should have.\nI can\'t undo it.\n\nBut a forest grows from broken ground —\nand so can I.',{delay:500,speed:40})
        .then(function(){setTimeout(function(){cancelAnimationFrame(rIds.forest);goTo('s3').then(startMemBg)},2600)})}
  }
  rIds.forest=requestAnimationFrame(frame)
}

/* ── Memory BG ── */
function makeParts(cnt,W,H){
  var pal=[[255,200,100],[255,185,80],[240,165,65],[255,220,140],[210,145,60],[255,175,65]];
  return Array.from({length:Math.min(Math.max(cnt,1),160)},function(){
    var c=pal[Math.floor(Math.random()*pal.length)];
    return{x:W*.2+Math.random()*W*.6,y:H*.15+Math.random()*H*.65,
      vx:(Math.random()-.5)*.35,vy:-(Math.random()*.28+.06),
      r:1.8+Math.random()*3.4,color:c,alpha:.35+Math.random()*.5,
      freq:.5+Math.random()*1.6,phase:Math.random()*Math.PI*2}})
}
function startMemBg(){
  var c=document.getElementById('m-c'),ctx=c.getContext('2d');
  c.width=document.getElementById('wrap').offsetWidth;c.height=document.getElementById('wrap').offsetHeight;
  var W=c.width,H=c.height;mParts=makeParts(18,W,H);
  cancelAnimationFrame(rIds.mem);var t=0;
  function frame(){t+=.01;ctx.clearRect(0,0,W,H);
    var bg=ctx.createRadialGradient(W/2,H*.4,0,W/2,H*.5,W*.75);
    bg.addColorStop(0,'rgba(40,26,8,.97)');bg.addColorStop(1,'rgba(8,6,3,.99)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    mParts.forEach(function(p){
      p.x+=p.vx+Math.sin(t*p.freq+p.phase)*.28;p.y+=p.vy+Math.cos(t*p.freq*.7+p.phase)*.18;
      if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;if(p.y<-20)p.y=H+20;if(p.y>H+20)p.y=-20;
      var pulse=(Math.sin(t*p.freq+p.phase)*.28+.72)*p.alpha;
      var rr=p.r*(1+Math.sin(t*p.freq*1.4+p.phase)*.12);
      var r=p.color[0],g=p.color[1],b=p.color[2];
      var grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr*5);
      grd.addColorStop(0,'rgba('+r+','+g+','+b+','+pulse+')');grd.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
      ctx.beginPath();ctx.arc(p.x,p.y,rr*5,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,rr,0,Math.PI*2);ctx.fillStyle='rgba('+r+','+g+','+b+','+(pulse*.75)+')';ctx.fill()});
    rIds.mem=requestAnimationFrame(frame)}
  frame()
}

/* ── Yes ── */
function runYes(){
  var canvas=document.getElementById('y-c'),ctx=canvas.getContext('2d');
  canvas.width=document.getElementById('wrap').offsetWidth;canvas.height=document.getElementById('wrap').offsetHeight;
  var W=canvas.width,H=canvas.height;
  var sparks=Array.from({length:70},function(_,i){return{angle:(i/70)*Math.PI*2,r0:55+Math.random()*85,speed:16+Math.random()*26,size:1.1+Math.random()*2,alpha:.28+Math.random()*.45,freq:.4+Math.random()*1.2,phase:Math.random()*Math.PI*2}});
  var t=0,st=performance.now();
  function frame(ts){t=(ts-st)/1000;ctx.clearRect(0,0,W,H);
    var bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.78);
    bg.addColorStop(0,'rgba('+(28+Math.sin(t*.4)*.04*40|0)+','+(17+Math.sin(t*.4)*.04*20|0)+',5,1)');bg.addColorStop(1,'rgba(5,5,10,1)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(var ri=0;ri<5;ri++){ctx.beginPath();ctx.arc(W/2,H/2,75+ri*55+Math.sin(t*.3+ri*.8)*12,0,Math.PI*2);ctx.strokeStyle='rgba(201,160,82,'+(Math.max(0,.07-ri*.012))+')';ctx.lineWidth=18+ri*12;ctx.stroke()}
    sparks.forEach(function(p,i){
      var x=W/2+Math.sin(p.angle+t*.15)*p.r0+Math.sin(t*p.freq+p.phase)*20;
      var rawY=H/2-((t*p.speed+i*9)%(H*.86));
      var pr=1-(rawY+H*.4)/(H*.86+H*.4);var a=Math.min(p.alpha,p.alpha*Math.sin(pr*Math.PI));
      if(a<=0)return;ctx.beginPath();ctx.arc(x,rawY,p.size,0,Math.PI*2);ctx.fillStyle='rgba(201,160,82,'+a+')';ctx.fill()});
    rIds.yes=requestAnimationFrame(frame)}
  rIds.yes=requestAnimationFrame(frame);
  typeW(document.getElementById('y-msg'),'Then maybe…\nthere is still something\nworth saving, Shravani.',{delay:900,speed:58})
    .then(function(){var b=document.getElementById('r-btn');setTimeout(function(){b.style.transition='opacity 2s ease';b.style.opacity='1'},600)})
}

function runNo(){
  typeW(document.getElementById('no-msg'),'I understand, Shravani…\nAnd I will respect that.\n\nI am still sorry —\nfor everything I broke in you.',{delay:900,speed:60})
}

/* ── Restart Overlay ── */
function showOv(){
  var ov=document.getElementById('ov'),c=document.getElementById('ov-c'),ctx=c.getContext('2d');
  c.width=document.getElementById('wrap').offsetWidth;c.height=document.getElementById('wrap').offsetHeight;
  var W=c.width,H=c.height;
  var petals=Array.from({length:50},function(){return{x:Math.random()*W,y:-30-Math.random()*H,vx:(Math.random()-.5)*1.1,vy:.8+Math.random()*1.4,r:3+Math.random()*5,hue:22+Math.random()*28,alpha:.16+Math.random()*.28,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.025,sw:Math.random()*Math.PI*2,swf:.4+Math.random()*.8}});
  var t=0;
  function draw(){t+=.008;ctx.clearRect(0,0,W,H);
    var bg=ctx.createRadialGradient(W/2,H*.45,0,W/2,H*.5,W*.7);
    bg.addColorStop(0,'rgba(28,18,6,1)');bg.addColorStop(.5,'rgba(14,10,4,1)');bg.addColorStop(1,'rgba(5,5,8,1)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(var ri=0;ri<4;ri++){var rad=70+ri*75+Math.sin(t*.25+ri)*15;
      var gg=ctx.createRadialGradient(W/2,H*.45,0,W/2,H*.45,rad);
      gg.addColorStop(0,'rgba(201,160,82,'+(0.038-ri*.007)+')');gg.addColorStop(1,'rgba(201,160,82,0)');
      ctx.beginPath();ctx.arc(W/2,H*.45,rad,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill()}
    petals.forEach(function(p){
      p.y+=p.vy;p.x+=p.vx+Math.sin(t*p.swf+p.sw)*.55;p.rot+=p.rv;
      if(p.y>H+20){p.y=-20;p.x=Math.random()*W}
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.42,0,0,Math.PI*2);
      ctx.fillStyle='hsla('+p.hue+',68%,74%,'+p.alpha+')';ctx.fill();ctx.restore()});
    ovRaf=requestAnimationFrame(draw)}
  draw();ov.classList.add('show');
  var bd=document.getElementById('ov-b');bd.style.opacity='0';bd.textContent='';
  var msg='Every forest began with a single seed.\nEvery love story begins with a single choice.\n\nLet\'s plant ours again —\nmore carefully this time.\nMore gently. More truthfully.\n\nI\'m ready if you are.';
  setTimeout(function(){typeW(bd,msg,{delay:1300,speed:50}).then(function(){
    var cta=document.getElementById('ov-go');cta.style.transition='opacity 1s ease';cta.style.opacity='1'})},400)
}

function doReset(){
  cancelAnimationFrame(ovRaf);ovRaf=null;
  document.getElementById('ov').classList.remove('show');
  Object.keys(rIds).forEach(function(k){cancelAnimationFrame(rIds[k])});rIds={};mParts=[];
  document.getElementById('t-in').value='';document.getElementById('d-in').value='';
  ['f-msg','m-msg','y-msg','no-msg'].forEach(function(id){var e=document.getElementById(id);e.textContent='';e.style.opacity='0'});
  document.getElementById('r-btn').style.opacity='0';
  document.getElementById('ov-go').style.opacity='0';
  document.getElementById('ov-b').textContent='';document.getElementById('ov-b').style.opacity='0';
  var mu=document.getElementById('m-ui');mu.style.opacity='1';mu.style.pointerEvents='all';
  ['f-c','m-c','y-c','ov-c'].forEach(function(id){var c=document.getElementById(id);if(c)c.getContext('2d').clearRect(0,0,c.width,c.height)});
  goTo('s1')
}

document.getElementById('t-sub').onclick=function(){
  var v=parseInt(document.getElementById('t-in').value);tearN=isNaN(v)||v<1?1:Math.min(v,20);goTo('s2').then(runForest)};
document.getElementById('t-in').onkeydown=function(e){if(e.key==='Enter')document.getElementById('t-sub').click()};
document.getElementById('d-sub').onclick=function(){
  var v=parseInt(document.getElementById('d-in').value);dayN=isNaN(v)||v<1?5:Math.min(v,160);
  var c=document.getElementById('m-c');mParts=makeParts(dayN,c.width,c.height);
  var mu=document.getElementById('m-ui');mu.style.transition='opacity 1.1s ease';mu.style.opacity='0';setTimeout(function(){mu.style.pointerEvents='none'},1200);
  typeW(document.getElementById('m-msg'),'Those moments meant everything to me, Shravani.',{delay:1000,speed:52})
    .then(function(){setTimeout(function(){cancelAnimationFrame(rIds.mem);goTo('s4')},2300)})};
document.getElementById('d-in').onkeydown=function(e){if(e.key==='Enter')document.getElementById('d-sub').click()};
document.getElementById('b-yes').onclick=function(){goTo('s5').then(runYes)};
document.getElementById('b-no').onclick=function(){goTo('s6').then(runNo)};
document.getElementById('r-btn').onclick=showOv;
document.getElementById('ov-go').onclick=doReset;
</script>
